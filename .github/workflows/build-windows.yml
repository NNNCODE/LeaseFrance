name: Windows build

# Builds the Windows installer from public source on CI.
# This traceable pipeline is a prerequisite for SignPath Foundation code
# signing; the signing submission step is added once the project is approved.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 20 is EOL (2026-04) and the Electron 42 toolchain is verified on 22.
          node-version: 22
          cache: npm

      - name: Install dependencies (rebuilds better-sqlite3 for Electron)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # electron-builder's winCodeSign archive contains macOS symlinks that can
      # fail to extract on Windows without symlink privileges, aborting the
      # build. Pre-extract it into the cache, tolerating the symlink errors
      # (7z exit code 2); only rcedit/signtool binaries are actually needed.
      - name: Pre-seed electron-builder winCodeSign cache
        shell: pwsh
        run: |
          $cache = Join-Path $env:LOCALAPPDATA "electron-builder\Cache\winCodeSign"
          $target = Join-Path $cache "winCodeSign-2.6.0"
          if (Test-Path (Join-Path $target "rcedit-x64.exe")) { exit 0 }
          New-Item -ItemType Directory -Force $cache | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "winCodeSign-2.6.0.7z"
          curl.exe -sSL -o $archive https://github.com/electron-userland/electron-builder-binaries/releases/download/winCodeSign-2.6.0/winCodeSign-2.6.0.7z
          7z x $archive -o"$target" -y
          if ($LASTEXITCODE -gt 2) { exit $LASTEXITCODE }
          if (-not (Test-Path (Join-Path $target "rcedit-x64.exe"))) { Write-Error "rcedit-x64.exe missing after extraction"; exit 1 }
          exit 0

      # --publish never: on CI electron-builder otherwise tries to auto-publish
      # to GitHub Releases and fails without a token; releases are attached
      # manually from verified artifacts.
      - name: Build Windows installer
        run: npm run dist -- --publish never

      - name: Compute SHA256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$h  $($_.Name)" | Set-Content -Encoding ascii "$($_.FullName).sha256"
            Write-Output "$h  $($_.Name)"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.exe.sha256
          if-no-files-found: error
