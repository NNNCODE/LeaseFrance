# appId kept as com.leasefrance.app to preserve upgrade-in-place support for existing Windows installs.
# Changing appId makes the OS treat it as a different application and creates a duplicate Add/Remove entry.
appId: com.leasefrance.app
# productName is now Baillio. Existing data is migrated in electron/appIdentity.ts so
# %APPDATA%/LeaseFrance content remains visible after the rename.
productName: Baillio
copyright: Copyright © 2026

# ASAR : code empaqueté et non lisible directement
asar: true
asarUnpack:
  - "**/*.node"   # modules natifs (ex: better-sqlite3)

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/auto-update.json
    to: auto-update.json
  - from: build/license-runtime.json
    to: license-runtime.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico
  # true lets rcedit embed build/icon.ico and version metadata into Baillio.exe.
  # No code signing happens unless a certificate is configured.
  signAndEditExecutable: true

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - fr_FR
  language: 1036   # Français
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Baillio

# Skip rebuild during packaging because better-sqlite3 is already aligned in postinstall.
# Rebuilding here is fragile on Windows when a local Electron process keeps the native module open.
npmRebuild: false
nodeGypRebuild: false
